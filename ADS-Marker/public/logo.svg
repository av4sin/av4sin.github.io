<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" width="600" height="600">
  <defs>
    <filter id="shadow-logo" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-opacity="0.35" flood-color="#000000"/>
    </filter>
  </defs>

  <!-- Círculo negro de fondo (más grande respecto a los elementos) -->
  <circle cx="300" cy="300" r="290" fill="#000000" filter="url(#shadow-logo)"/>

  <!-- Símbolo < (más estrecho y separado de la barra) -->
  <polyline points="100,200 60,250 100,300" fill="none" stroke="#22AEC2" stroke-width="14" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Línea diagonal / (separada del texto ADS) -->
  <line x1="140" y1="305" x2="175" y2="195" stroke="#22AEC2" stroke-width="14" stroke-linecap="square"/>

  <!-- Texto ADS (desplazado a la derecha para separarlo de la /) -->
  <text x="340" y="295" font-size="140" font-weight="500" fill="#FFFFFF" text-anchor="middle" font-family="'Segoe UI', Trebuchet MS, sans-serif" letter-spacing="-1">ADS</text>

  <!-- Símbolo > (más estrecho y separado) -->
  <polyline points="510,200 550,250 510,300" fill="none" stroke="#22AEC2" stroke-width="14" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Textos inferiores -->
  <text x="300" y="415" font-size="34" fill="#FFFFFF" text-anchor="middle" font-family="Consolas, monospace" letter-spacing="1">Asociación de Desarrollo</text>
  <text x="300" y="465" font-size="34" fill="#FFFFFF" text-anchor="middle" font-family="Consolas, monospace" letter-spacing="1">Software</text>
</svg>