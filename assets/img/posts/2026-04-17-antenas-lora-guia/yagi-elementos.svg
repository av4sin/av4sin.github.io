<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-labelledby="title desc">
  <title id="title">Partes de una antena Yagi</title>
  <desc id="desc">Diagrama de reflector, dipolo excitado y directores sobre un boom.</desc>
  <rect width="1200" height="440" fill="#0b1020"/>
  <text x="600" y="52" text-anchor="middle" fill="#e5e7eb" font-size="34" font-family="Arial, sans-serif">Partes de una Yagi-Uda (vista lateral simplificada)</text>

  <line x1="120" y1="230" x2="1080" y2="230" stroke="#94a3b8" stroke-width="8"/>
  <text x="600" y="265" text-anchor="middle" fill="#cbd5e1" font-size="18" font-family="Arial, sans-serif">Boom</text>

  <line x1="250" y1="120" x2="250" y2="340" stroke="#22d3ee" stroke-width="8"/>
  <line x1="420" y1="140" x2="420" y2="320" stroke="#f59e0b" stroke-width="8"/>
  <line x1="560" y1="150" x2="560" y2="310" stroke="#22d3ee" stroke-width="7"/>
  <line x1="680" y1="155" x2="680" y2="305" stroke="#22d3ee" stroke-width="7"/>
  <line x1="790" y1="160" x2="790" y2="300" stroke="#22d3ee" stroke-width="7"/>
  <line x1="890" y1="165" x2="890" y2="295" stroke="#22d3ee" stroke-width="7"/>

  <text x="250" y="102" text-anchor="middle" fill="#93c5fd" font-size="20" font-family="Arial, sans-serif">Reflector</text>
  <text x="420" y="122" text-anchor="middle" fill="#fcd34d" font-size="20" font-family="Arial, sans-serif">Dipolo excitado</text>
  <text x="740" y="122" text-anchor="middle" fill="#93c5fd" font-size="20" font-family="Arial, sans-serif">Directores</text>

  <polygon points="940,230 1070,180 1070,280" fill="#22c55e" opacity="0.35"/>
  <text x="1020" y="168" text-anchor="middle" fill="#86efac" font-size="20" font-family="Arial, sans-serif">Direccion de maxima radiacion</text>
</svg>
