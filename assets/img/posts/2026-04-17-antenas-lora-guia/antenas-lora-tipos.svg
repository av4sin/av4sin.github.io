<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Tipos de antena para LoRa</title>
  <desc id="desc">Esquema simple de monopolo, dipolo y yagi con sus patrones de radiacion orientativos.</desc>
  <rect width="1200" height="620" fill="#0f172a"/>
  <text x="600" y="56" text-anchor="middle" fill="#e2e8f0" font-size="34" font-family="Arial, sans-serif">Esquema rapido: antenas comunes en LoRa</text>

  <rect x="40" y="90" width="360" height="490" rx="16" fill="#111827" stroke="#334155"/>
  <text x="220" y="130" text-anchor="middle" fill="#f8fafc" font-size="26" font-family="Arial, sans-serif">Monopolo (1/4 onda)</text>
  <line x1="220" y1="430" x2="220" y2="230" stroke="#22d3ee" stroke-width="8"/>
  <line x1="140" y1="430" x2="300" y2="430" stroke="#94a3b8" stroke-width="8"/>
  <ellipse cx="220" cy="330" rx="120" ry="70" fill="none" stroke="#16a34a" stroke-width="4" stroke-dasharray="10 8"/>
  <text x="220" y="468" text-anchor="middle" fill="#cbd5e1" font-size="18" font-family="Arial, sans-serif">Patron casi omnidireccional</text>

  <rect x="420" y="90" width="360" height="490" rx="16" fill="#111827" stroke="#334155"/>
  <text x="600" y="130" text-anchor="middle" fill="#f8fafc" font-size="26" font-family="Arial, sans-serif">Dipolo (1/2 onda)</text>
  <line x1="600" y1="230" x2="600" y2="315" stroke="#22d3ee" stroke-width="8"/>
  <line x1="600" y1="345" x2="600" y2="430" stroke="#22d3ee" stroke-width="8"/>
  <circle cx="600" cy="330" r="10" fill="#f59e0b"/>
  <ellipse cx="600" cy="330" rx="125" ry="85" fill="none" stroke="#16a34a" stroke-width="4" stroke-dasharray="10 8"/>
  <text x="600" y="468" text-anchor="middle" fill="#cbd5e1" font-size="18" font-family="Arial, sans-serif">Patron equilibrado en horizontal</text>

  <rect x="800" y="90" width="360" height="490" rx="16" fill="#111827" stroke="#334155"/>
  <text x="980" y="130" text-anchor="middle" fill="#f8fafc" font-size="26" font-family="Arial, sans-serif">Yagi (directiva)</text>
  <line x1="875" y1="330" x2="1085" y2="330" stroke="#94a3b8" stroke-width="6"/>
  <line x1="900" y1="280" x2="900" y2="380" stroke="#22d3ee" stroke-width="7"/>
  <line x1="950" y1="290" x2="950" y2="370" stroke="#22d3ee" stroke-width="6"/>
  <line x1="995" y1="295" x2="995" y2="365" stroke="#22d3ee" stroke-width="6"/>
  <line x1="1035" y1="300" x2="1035" y2="360" stroke="#22d3ee" stroke-width="6"/>
  <polygon points="1048,330 1115,305 1115,355" fill="#16a34a" opacity="0.4"/>
  <text x="980" y="468" text-anchor="middle" fill="#cbd5e1" font-size="18" font-family="Arial, sans-serif">Mas ganancia, solo hacia delante</text>
</svg>
