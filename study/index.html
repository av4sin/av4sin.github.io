<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj Flip 24h</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Montserrat:wght@700;800&family=Oswald:wght@700&display=swap');

        @font-face {
            font-family: 'MyFont GMB';
            src: url('../assets/fonts/myfontGMB.ttf') format('truetype'),
                 url('/assets/fonts/myfontGMB.ttf') format('truetype');
            font-style: normal;
            font-weight: 400 900;
            font-display: swap;
        }

        :root {
            --bg-color: #000000;
            --card-color: #1E1E1E;
            --digit-color: #f1f1f4;
            --divider-color: #1f2026;
            --top-shade: #cbcbce;
            --bottom-shade: #f0f0f2;
            --digit-font: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            --digit-scale: 1;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--bg-color);
            color: var(--digit-color);
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        }

        body.cursor-hidden,
        body.cursor-hidden * {
            cursor: none !important;
        }

        .clock-app {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.1vw;
            padding: 4vw;
        }

        .group {
            position: relative;
            width: min(37vw, 520px);
            aspect-ratio: 1.25 / 1;
            border-radius: 20px;
            background: var(--card-color);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .group.is-hidden {
            display: none;
        }

        .group::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 1px;
            transform: translateY(-50%);
            background: var(--divider-color);
            z-index: 2;
        }

        .value-top,
        .value-bottom {
            position: absolute;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            letter-spacing: -0.01em;
            line-height: 1;
            font-size: calc(clamp(98px, 21vw, 300px) * var(--digit-scale));
            font-family: var(--digit-font);
            user-select: none;
            pointer-events: none;
        }

        .value-top {
            top: 0;
            bottom: 0;
            color: var(--top-shade);
            clip-path: inset(0 0 50% 0);
        }

        .value-bottom {
            top: 0;
            bottom: 0;
            color: var(--bottom-shade);
            clip-path: inset(50% 0 0 0);
        }

        #secondsGroup.is-analog::after,
        #secondsGroup.is-analog .value-top,
        #secondsGroup.is-analog .value-bottom {
            display: none;
        }

        .seconds-analog {
            display: none;
            position: relative;
            width: min(68%, 220px);
            aspect-ratio: 1 / 1;
            border: 2px solid var(--top-shade);
            border-radius: 50%;
        }

        .seconds-analog::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--bottom-shade);
            transform: translate(-50%, -50%);
        }

        .seconds-hand {
            position: absolute;
            left: 50%;
            bottom: 50%;
            width: 4px;
            height: 40%;
            border-radius: 4px;
            background: var(--bottom-shade);
            transform-origin: center 100%;
            transform: translateX(-50%) rotate(0deg);
        }

        #secondsGroup.is-analog .seconds-analog {
            display: block;
        }

        .flip-top,
        .flip-bottom {
            position: absolute;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            letter-spacing: -0.01em;
            line-height: 1;
            font-size: calc(clamp(98px, 21vw, 300px) * var(--digit-scale));
            font-family: var(--digit-font);
            pointer-events: none;
            z-index: 3;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }

        .flip-top {
            top: 0;
            bottom: 0;
            color: var(--top-shade);
            transform-origin: center 50%;
            clip-path: inset(0 0 50% 0);
            animation: topFlip 320ms ease-in forwards;
        }

        .flip-bottom {
            top: 0;
            bottom: 0;
            color: var(--bottom-shade);
            transform: rotateX(90deg);
            transform-origin: center 50%;
            clip-path: inset(50% 0 0 0);
            animation: bottomFlip 320ms ease-out 320ms forwards;
        }

        @keyframes topFlip {
            to {
                transform: rotateX(-90deg);
            }
        }

        @keyframes bottomFlip {
            to {
                transform: rotateX(0deg);
            }
        }

        .ui-controls {
            position: fixed;
            top: 16px;
            right: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(0, 0, 0, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 10px;
            backdrop-filter: blur(4px);
            transition: opacity 0.42s ease, transform 0.42s ease;
            opacity: 1;
            transform: translateY(0) scale(1);
            z-index: 10;
        }

        .ui-controls.is-hidden {
            opacity: 0;
            transform: translateY(-6px) scale(0.98);
            pointer-events: none;
        }

        .control-row {
            display: flex;
            gap: 8px;
        }

        .ui-btn {
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: #121217;
            color: #f5f5f7;
            font-size: 14px;
            line-height: 1;
            border-radius: 8px;
            padding: 10px 12px;
            cursor: pointer;
        }

        .ui-btn.icon-btn {
            width: 40px;
            padding: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .ui-btn.icon-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .palette {
            display: none;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .palette.is-open {
            display: grid;
        }

        .color-line {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
            font-size: 13px;
            color: #e7e7eb;
        }

        .color-line input[type="color"] {
            width: 38px;
            height: 28px;
            border: 0;
            background: transparent;
            padding: 0;
            cursor: pointer;
        }

        .color-line select {
            background: #121217;
            color: #f5f5f7;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 6px;
            padding: 4px 8px;
            min-width: 140px;
        }

        #secondsToggleBtn {
            justify-self: end;
        }

        @media (max-width: 880px) {
            .clock-app {
                gap: 2vw;
                padding: 3vw;
            }

            .group {
                width: min(43vw, 410px);
                border-radius: 14px;
            }
        }
    </style>
</head>
<body>
    <main class="clock-app" aria-label="Reloj flip 24 horas">
        <section class="group" id="hoursGroup" aria-label="Horas">
            <span class="value-top" id="hoursTop">00</span>
            <span class="value-bottom" id="hoursBottom">00</span>
        </section>

        <section class="group" id="minutesGroup" aria-label="Minutos">
            <span class="value-top" id="minutesTop">00</span>
            <span class="value-bottom" id="minutesBottom">00</span>
        </section>

        <section class="group" id="secondsGroup" aria-label="Segundos">
            <span class="value-top" id="secondsTop">00</span>
            <span class="value-bottom" id="secondsBottom">00</span>
            <div class="seconds-analog" id="secondsAnalog" aria-hidden="true">
                <span class="seconds-hand" id="secondsHand"></span>
            </div>
        </section>
    </main>

    <aside class="ui-controls" id="controlsPanel" aria-label="Opciones de reloj">
        <div class="control-row">
            <button class="ui-btn icon-btn" id="homeBtn" type="button" aria-label="Ir al inicio" title="Inicio">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M12 3.2 3 10.6v10.2h6.2v-6.4h5.6v6.4H21V10.6L12 3.2zm7.8 16.4h-3.8v-6.4H8v6.4H4.2v-8.4L12 4.8l7.8 6.4v8.4z"/>
                </svg>
            </button>
            <button class="ui-btn icon-btn" id="fullscreenBtn" type="button" aria-label="Pantalla completa" title="Pantalla completa">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M4 9V4h5v2H6v3H4zm10-5h5v5h-2V6h-3V4zM4 15h2v3h3v2H4v-5zm13 3v-3h2v5h-5v-2h3z"/>
                </svg>
            </button>
            <button class="ui-btn icon-btn" id="colorsBtn" type="button" aria-label="Opciones" title="Opciones">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M3 17h6v2H3v-2zm0-6h10v2H3v-2zm0-6h14v2H3V5zm16 14a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm-4-6a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm6-6a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"/>
                </svg>
            </button>
        </div>

        <div class="palette" id="palettePanel">
            <label class="color-line">Fondo <input type="color" id="bgColor" value="#000000"></label>
            <label class="color-line">Tarjeta <input type="color" id="cardColor" value="#34332F"></label>
            <label class="color-line">Número superior <input type="color" id="topDigitColor" value="#cbcbce"></label>
            <label class="color-line">Número inferior <input type="color" id="bottomDigitColor" value="#f0f0f2"></label>
            <label class="color-line">Fuente números
                <select id="digitFontSelect">
                    <option value="inter">Inter</option>
                    <option value="montserrat">Montserrat</option>
                    <option value="oswald">Oswald</option>
                    <option value="arial">Arial</option>
                    <option value="courier">Courier New</option>
                    <option value="gmb">MyFont GMB</option>
                </select>
            </label>
            <button class="ui-btn icon-btn" id="secondsToggleBtn" type="button" aria-label="Activar segundos" title="Activar segundos">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M12 2a10 10 0 1 0 10 10A10.01 10.01 0 0 0 12 2zm1 10.59 3.7 3.7-1.4 1.41L11 13V7h2z"/>
                </svg>
            </button>
        </div>
    </aside>

    <script>
        const controlsPanel = document.getElementById('controlsPanel');
        const palettePanel = document.getElementById('palettePanel');
        const homeBtn = document.getElementById('homeBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const colorsBtn = document.getElementById('colorsBtn');

        const hoursGroup = document.getElementById('hoursGroup');
        const minutesGroup = document.getElementById('minutesGroup');
        const secondsGroup = document.getElementById('secondsGroup');
        const hoursTop = document.getElementById('hoursTop');
        const hoursBottom = document.getElementById('hoursBottom');
        const minutesTop = document.getElementById('minutesTop');
        const minutesBottom = document.getElementById('minutesBottom');
        const secondsTop = document.getElementById('secondsTop');
        const secondsBottom = document.getElementById('secondsBottom');

        const bgColor = document.getElementById('bgColor');
        const cardColor = document.getElementById('cardColor');
        const topDigitColor = document.getElementById('topDigitColor');
        const bottomDigitColor = document.getElementById('bottomDigitColor');
        const digitFontSelect = document.getElementById('digitFontSelect');
        const secondsToggleBtn = document.getElementById('secondsToggleBtn');
        const secondsHand = document.getElementById('secondsHand');

        const STORAGE_KEY = 'flip-clock-theme';
        const DIGIT_FONTS = {
            inter: 'Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif',
            montserrat: 'Montserrat, Inter, system-ui, sans-serif',
            oswald: 'Oswald, Inter, system-ui, sans-serif',
            arial: 'Arial, Helvetica, sans-serif',
            courier: '"Courier New", Courier, monospace',
            gmb: '"MyFont GMB", Inter, system-ui, sans-serif'
        };
        let hideTimer;
        let previousHours = null;
        let previousMinutes = null;
        let previousSeconds = null;
        let secondsEnabled = false;
        let analogSecondsUnlocked = false;
        let keySequence = [];
        const secretCombo = ['arrowup', 'arrowup', 'arrowdown', 'arrowdown', 'arrowleft', 'arrowright', 'arrowleft', 'arrowright', 'b', 'a'];

        function pad(value) {
            return String(value).padStart(2, '0');
        }

        function applyTheme(theme) {
            const selectedFont = DIGIT_FONTS[theme.font] ? theme.font : 'inter';
            const digitScale = selectedFont === 'gmb' ? 2.5 : 1;
            document.documentElement.style.setProperty('--bg-color', theme.bg);
            document.documentElement.style.setProperty('--card-color', theme.card);
            document.documentElement.style.setProperty('--top-shade', theme.top);
            document.documentElement.style.setProperty('--bottom-shade', theme.bottom);
            document.documentElement.style.setProperty('--digit-font', DIGIT_FONTS[selectedFont]);
            document.documentElement.style.setProperty('--digit-scale', String(digitScale));
            bgColor.value = theme.bg;
            cardColor.value = theme.card;
            topDigitColor.value = theme.top;
            bottomDigitColor.value = theme.bottom;
            digitFontSelect.value = selectedFont;
        }

        function getTheme() {
            return {
                bg: bgColor.value,
                card: cardColor.value,
                top: topDigitColor.value,
                bottom: bottomDigitColor.value,
                font: digitFontSelect.value
            };
        }

        function saveTheme() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(getTheme()));
        }

        function loadTheme() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) {
                return;
            }

            try {
                const parsed = JSON.parse(raw);
                if (parsed.bg && parsed.card && parsed.top && parsed.bottom) {
                    applyTheme(parsed);
                }
            } catch {
                localStorage.removeItem(STORAGE_KEY);
            }
        }

        function createFlip(group, topNode, bottomNode, previousValue, nextValue) {
            const flipTop = document.createElement('span');
            flipTop.className = 'flip-top';
            flipTop.textContent = previousValue;

            const flipBottom = document.createElement('span');
            flipBottom.className = 'flip-bottom';
            flipBottom.textContent = nextValue;

            group.appendChild(flipTop);
            group.appendChild(flipBottom);

            flipTop.addEventListener('animationend', () => {
                topNode.textContent = nextValue;
            }, { once: true });

            flipBottom.addEventListener('animationend', () => {
                bottomNode.textContent = nextValue;
                flipTop.remove();
                flipBottom.remove();
            }, { once: true });
        }

        function updateGroup(group, topNode, bottomNode, prevValue, nextValue) {
            if (prevValue === null) {
                topNode.textContent = nextValue;
                bottomNode.textContent = nextValue;
                return nextValue;
            }

            if (prevValue !== nextValue) {
                createFlip(group, topNode, bottomNode, prevValue, nextValue);
            }

            return nextValue;
        }

        function tick() {
            const now = new Date();
            const currentHours = pad(now.getHours());
            const currentMinutes = pad(now.getMinutes());
            const currentSeconds = pad(now.getSeconds());

            previousHours = updateGroup(hoursGroup, hoursTop, hoursBottom, previousHours, currentHours);
            previousMinutes = updateGroup(minutesGroup, minutesTop, minutesBottom, previousMinutes, currentMinutes);

            if (!secondsEnabled) {
                return;
            }

            if (analogSecondsUnlocked) {
                updateSecondsHand(Number(currentSeconds));
                return;
            }

            if (previousSeconds !== currentSeconds) {
                secondsTop.textContent = currentSeconds;
                secondsBottom.textContent = currentSeconds;
                previousSeconds = currentSeconds;
            }
        }

        function updateSecondsHand(seconds) {
            const angle = seconds * 6;
            secondsHand.style.transform = `translateX(-50%) rotate(${angle}deg)`;
        }

        function setFullscreenButtonState(isFullscreen) {
            fullscreenBtn.setAttribute('aria-label', isFullscreen ? 'Salir de pantalla completa' : 'Pantalla completa');
            fullscreenBtn.setAttribute('title', isFullscreen ? 'Salir de pantalla completa' : 'Pantalla completa');
            fullscreenBtn.innerHTML = isFullscreen
                ? '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M9 4v2H6v3H4V4h5zm11 0v5h-2V6h-3V4h5zM4 15h2v3h3v2H4v-5zm14 0h2v5h-5v-2h3v-3z"/></svg>'
                : '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M4 9V4h5v2H6v3H4zm10-5h5v5h-2V6h-3V4zM4 15h2v3h3v2H4v-5zm13 3v-3h2v5h-5v-2h3z"/></svg>';
        }

        function setSecondsButtonState() {
            if (!secondsEnabled) {
                secondsToggleBtn.setAttribute('aria-label', 'Activar segundos');
                secondsToggleBtn.setAttribute('title', 'Activar segundos');
                secondsToggleBtn.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 2a10 10 0 1 0 10 10A10.01 10.01 0 0 0 12 2zm1 10.59 3.7 3.7-1.4 1.41L11 13V7h2z"/></svg>';
                return;
            }

            if (analogSecondsUnlocked) {
                secondsToggleBtn.setAttribute('aria-label', 'Segundos activos en manecillas');
                secondsToggleBtn.setAttribute('title', 'Segundos activos en manecillas');
                secondsToggleBtn.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 2a10 10 0 1 0 10 10A10.01 10.01 0 0 0 12 2zm0 2a8 8 0 0 1 8 8h-8V4zm0 16a8 8 0 0 1 0-16v8h8a8 8 0 0 1-8 8z"/></svg>';
                return;
            }

            secondsToggleBtn.setAttribute('aria-label', 'Desactivar segundos');
            secondsToggleBtn.setAttribute('title', 'Desactivar segundos');
            secondsToggleBtn.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 2a10 10 0 1 0 10 10A10.01 10.01 0 0 0 12 2zm1 5v5h4v2h-6V7z"/></svg>';
        }

        function setSecondsEnabled(enabled) {
            secondsEnabled = enabled;
            secondsGroup.classList.toggle('is-hidden', !enabled);

            if (!enabled) {
                previousSeconds = null;
                secondsGroup.classList.remove('is-analog');
                setSecondsButtonState();
                return;
            }

            const now = new Date();
            const currentSeconds = pad(now.getSeconds());

            if (analogSecondsUnlocked) {
                secondsGroup.classList.add('is-analog');
                setSecondsButtonState();
                updateSecondsHand(Number(currentSeconds));
                return;
            }

            secondsGroup.classList.remove('is-analog');
            secondsTop.textContent = currentSeconds;
            secondsBottom.textContent = currentSeconds;
            previousSeconds = currentSeconds;
            setSecondsButtonState();
        }

        function tryUnlockAnalogSeconds(event) {
            keySequence.push(event.key.toLowerCase());

            if (keySequence.length > secretCombo.length) {
                keySequence.shift();
            }

            if (!secondsEnabled) {
                return;
            }

            if (keySequence.join('') !== secretCombo.join('')) {
                return;
            }

            analogSecondsUnlocked = true;
            secondsGroup.classList.add('is-analog');
            setSecondsButtonState();
            updateSecondsHand(new Date().getSeconds());
        }

        function showControls() {
            controlsPanel.classList.remove('is-hidden');
            document.body.classList.remove('cursor-hidden');
            clearTimeout(hideTimer);
            hideTimer = setTimeout(() => {
                controlsPanel.classList.add('is-hidden');
                document.body.classList.add('cursor-hidden');
            }, 2000);
        }

        function showControlsIfHidden() {
            if (controlsPanel.classList.contains('is-hidden')) {
                showControls();
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                return;
            }
            document.exitFullscreen();
        }

        homeBtn.addEventListener('click', () => {
            window.location.href = '/';
        });

        fullscreenBtn.addEventListener('click', toggleFullscreen);
        colorsBtn.addEventListener('click', () => {
            palettePanel.classList.toggle('is-open');
            showControls();
        });

        [bgColor, cardColor, topDigitColor, bottomDigitColor].forEach((input) => {
            input.addEventListener('input', () => {
                applyTheme(getTheme());
                saveTheme();
                showControls();
            });
        });

        digitFontSelect.addEventListener('change', () => {
            applyTheme(getTheme());
            saveTheme();
            showControls();
        });

        secondsToggleBtn.addEventListener('click', () => {
            setSecondsEnabled(!secondsEnabled);
            showControls();
        });

        ['touchstart', 'keydown', 'click'].forEach((eventName) => {
            window.addEventListener(eventName, showControls, { passive: true });
        });

        window.addEventListener('mousemove', showControlsIfHidden, { passive: true });
        window.addEventListener('keydown', tryUnlockAnalogSeconds);

        document.addEventListener('fullscreenchange', () => {
            setFullscreenButtonState(Boolean(document.fullscreenElement));
        });

        loadTheme();
        setFullscreenButtonState(false);
        setSecondsEnabled(false);
        tick();
        setInterval(tick, 1000);
        showControls();
    </script>
</body>
</html>
